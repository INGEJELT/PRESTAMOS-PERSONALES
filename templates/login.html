<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Login | El Cardenal</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            background-color: #1a1d20; /* Fondo oscuro elegante */
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Segoe UI', sans-serif;
            margin: 0;
        }
        .login-card {
            background: white;
            border-radius: 15px;
            padding: 40px;
            width: 100%;
            max-width: 400px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }
        .logo-img {
            max-width: 220px; /* Ajuste para que luzca bien proporcionado */
            margin-bottom: 10px;
        }
        .btn-login {
            background-color: #f39c12; /* Color naranja institucional */
            border: none;
            color: white;
            font-weight: 800;
            text-transform: uppercase;
            padding: 12px;
            transition: all 0.3s ease;
        }
        .btn-login:hover {
            background-color: #d68910;
            color: white;
            transform: translateY(-2px);
            box-shadow: 0 4px 10px rgba(243, 156, 18, 0.3);
        }
        .firma {
            font-size: 0.85rem;
            font-weight: 800;
            color: #212529;
            text-align: center;
            margin-top: 30px;
            letter-spacing: 0.5px;
        }
    </style>
</head>
<body>

<div class="login-card text-center">
    <img src="{{ url_for('static', filename='logo_cardenal.png') }}" alt="El Cardenal" class="logo-img">
    <h6 class="fw-bold mb-4 text-dark text-uppercase">Control de Préstamos</h6>

    {% with messages = get_flashed_messages(with_categories=true) %}
      {% if messages %}
        {% for category, message in messages %}
          <div class="alert alert-danger small py-2 fw-bold">{{ message }}</div>
        {% endfor %}
      {% endif %}
    {% endwith %}

    <form action="/login" method="POST" class="text-start">
        <div class="mb-3">
            <label class="small fw-bold text-dark text-uppercase mb-1">Usuario de Sistemas</label>
            <input type="text" name="username" class="form-control" placeholder="Ej. SISTEMAS" required autofocus>
        </div>
        
        <div class="mb-4">
            <label class="small fw-bold text-dark text-uppercase mb-1">Contraseña</label>
            <input type="password" name="password" class="form-control" placeholder="••••••••" required>
        </div>

        <button type="submit" class="btn btn-login w-100 rounded-3">Entrar al Sistema</button>
    </form>

    <div class="firma">
        ING. JAIME EDUARDO LOZADA TAVERA
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
