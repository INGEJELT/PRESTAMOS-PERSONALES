<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Gráficas | El Cardenal</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        body { background: #f4f7f6; font-family: 'Segoe UI', sans-serif; padding: 40px; }
        .chart-container { background: white; border-radius: 15px; padding: 40px; box-shadow: 0 10px 30px rgba(0,0,0,0.08); margin-top: 20px; }
    </style>
</head>
<body>
    <div class="container">
        <div class="d-flex justify-content-between align-items-center mb-2">
            <h2 class="fw-bold text-dark text-uppercase"><i class="fas fa-chart-column text-primary me-3"></i>{{ titulo }}</h2>
            <a href="/" class="btn btn-dark btn-lg"><i class="fas fa-arrow-left me-2"></i> Volver al Dashboard</a>
        </div>
        
        <p class="text-muted fs-5 mb-4">Visualización del estado financiero de los préstamos en tiempo real.</p>

        <div class="chart-container">
            <canvas id="graficaCardenal" height="120"></canvas>
        </div>
    </div>

<script>
    const ctx = document.getElementById('graficaCardenal').getContext('2d');
    
    // Configuramos los datos recibidos desde Python
    const labels = {{ labels | tojson }};
    const dataPrestado = {{ prestado | tojson }};
    const dataRecuperado = {{ recuperado | tojson }};
    const dataPendiente = {{ pendiente | tojson }};

    new Chart(ctx, {
        type: 'bar',
        data: {
            labels: labels,
            datasets: [
                {
                    label: 'Monto Prestado ($)',
                    data: dataPrestado,
                    backgroundColor: 'rgba(13, 110, 253, 0.85)', // Azul
                    borderColor: 'rgba(13, 110, 253, 1)',
                    borderWidth: 1,
                    borderRadius: 6
                },
                {
                    label: 'Monto Recuperado ($)',
                    data: dataRecuperado,
                    backgroundColor: 'rgba(25, 135, 84, 0.85)', // Verde
                    borderColor: 'rgba(25, 135, 84, 1)',
                    borderWidth: 1,
                    borderRadius: 6
                },
                {
                    label: 'Saldo Pendiente ($)',
                    data: dataPendiente,
                    backgroundColor: 'rgba(220, 53, 69, 0.85)', // Rojo
                    borderColor: 'rgba(220, 53, 69, 1)',
                    borderWidth: 1,
                    borderRadius: 6
                }
            ]
        },
        options: {
            responsive: true,
            plugins: {
                legend: { position: 'top', labels: { font: { size: 14, weight: 'bold' } } },
                tooltip: {
                    callbacks: {
                        label: function(context) {
                            let value = context.raw;
                            return context.dataset.label + ': $' + value.toLocaleString('en-US', {minimumFractionDigits: 2});
                        }
                    }
                }
            },
            scales: {
                y: {
                    beginAtZero: true,
                    ticks: {
                        font: { size: 14 },
                        callback: function(value) { return '$' + value.toLocaleString(); }
                    }
                },
                x: { ticks: { font: { size: 14, weight: 'bold' } } }
            }
        }
    });
</script>
</body>
</html>
